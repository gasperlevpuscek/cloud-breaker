<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>Brick</title>
    <link rel="stylesheet" href="../styles/level1style.css">
</head>

<body>
    <div class="gameWrapper">
        <div class="gameDiv">

            <div class="topperHolder">
                <div id="heartDiv">
                    Lives:
                </div>

                <div id="scoreDiv">
                    <p id="sctxt">SCORE:</p>
                    <p id="scoreText">0</p>
                </div>

                <div id="bestScoreDiv">
                    <p id="bestsctxt">(Best:</p>
                    <p id="bestscoreText">0</p>
                    <p>)</p>
                </div>

                <div id="timerDiv">
                    <p id="timerText">00:00</p>
                </div>
            </div>

            <div class="mainGameRow">
                <div class="sidePanel leftControlDiv">
                    <button type="button" id="helpBtn">HELP</button>
                    <button type="button" id="pauseBtn">PAUSE</button>
                    <button type="button" id="retryBtn">RETRY</button>
                </div>

                <div id="canvasDiv">
                    <canvas class="canvas" id="canvas" width="900" height="800"></canvas>
                </div>

                <div class="sidePanel rightLevelDiv">
                    <a href="level1.html">
                        <button type="button" class="activeLevelBtn">LVL1</button>
                    </a>

                    <a href="level2.html">
                        <button type="button">LVL2</button>
                    </a>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../scripts/level1/sweetAlerts.js"></script>
    <script src="../scripts/level1/sounds.js"></script>
    <script src="../scripts/level1/initialization.js"></script>
    <script src="../scripts/level1/main.js"></script>
    <script src="../scripts/level1/input.js"></script>
    <script src="../scripts/level1/drawing.js"></script>
    <script>
        loadBestScore();
        drawIt();
        playHellcatLoop();
    </script>
</body>

</html>
