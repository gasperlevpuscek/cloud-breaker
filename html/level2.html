<!DOCTYPE html>
<html lang="en-US">

<head>

    <link rel="stylesheet" href="../styles/level2style.css">
</head>

    <div id="bgdark">

    </div>

            <div id="heartDiv">

            </div>

    <div class="levelChooseDiv">
        <a href="level1.html"><button>

        <a href="level2.html"><button style="background-color: rgb(136, 136, 136);">

        <a href="level3.html"><button>
