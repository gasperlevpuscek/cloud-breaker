<!DOCTYPE html>
<html lang="en-US">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Brick</title>
    <link rel="stylesheet" href="../styles/level2style.css">
</head>

<body>
    <div class="rain front-row"></div>
    <div class="rain back-row"></div>
    <div id="bgdark"></div>

    <div class="gameWrapper">
        <div class="gameDiv">
            <div class="topperTopperHolder">
                <div class="topperHolder">
                    <div id="heartDiv">
                        Lives:
                    </div>

                    <div id="scoreDiv">
                        <p id="sctxt">SCORE:</p>
                        <p id="scoreText">0</p>
                    </div>

                    <div id="bestScoreDiv">
                        <p id="bestsctxt">(Best:</p>
                        <p id="bestscoreText">0</p>
                        <p>)</p>
                    </div>

                    <div id="timerDiv">
                        <p id="timerText">00:00</p>
                    </div>
                </div>
                <button type="button" id="helpBtn">HELP</button>
                <button type="button" id="pauseBtn">PAUSE</button>

            </div>
            <div class="mainGameRow">
                <div id="canvasDiv">
                    <canvas class="canvas" id="canvas" width="900" height="800"></canvas>
                </div>
            </div>
        </div>
    </div>
    <div id="levelPicker">
        <a href="../index.html"><button>menu</button></a>
        <a href="level1.html"><button>lvl1</button></a>
        <a><button>lvl2</button></a>
    </div>
    <div id="musicDiv">🎵 Waterflame - Race Around the World</div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../scripts/level2/lightning.js"></script>
    <script src="../scripts/level2/sweetAlerts.js"></script>
    <script src="../scripts/level2/sounds.js"></script>
    <script src="../scripts/level2/initialization.js"></script>
    <script src="../scripts/level2/main.js"></script>
    <script src="../scripts/level2/input.js"></script>
    <script src="../scripts/level2/drawing.js"></script>
    <script src="../scripts/level2/timer.js"></script>
    <script>
        window.addEventListener('load', function () {
            makeItRain();
            loadBestScore();
            drawIt();
            playMusicLoop();
        });
    </script>
</body>

</html>
